<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Watch Vehicle (FEAT-101): net-new frame-src allowlist. frame-src only —
         no default-src — so scripts/fonts/Firebase/connect are unrestricted; the
         app can only ever frame the nocookie YouTube embed. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="frame-src 'self' https://www.youtube-nocookie.com"
    />
    <link rel="icon" type="image/svg+xml" href="/icons/sunny.svg" />
    <link rel="apple-touch-icon" href="/icons/sunny-180.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4a7c59" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Luckiest+Guy&family=Fredoka:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <title>first-principles-engine</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
