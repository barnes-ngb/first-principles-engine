name: Deploy to Firebase

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for reliable diff

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Authenticate with GCP ───────────────────────────────────
      # Required IAM roles on the service account:
      #   - Cloud Functions Admin (roles/cloudfunctions.admin)
      #   - Service Account User (roles/iam.serviceAccountUser)
      #   - Cloud Build Editor (roles/cloudbuild.builds.editor)
      #   - Storage Admin (roles/storage.admin)
      #   - Artifact Registry Admin (roles/artifactregistry.admin)
      #   - Service Usage Consumer (roles/serviceusage.serviceUsageConsumer)
      #   - Firebase Extensions Viewer (roles/firebaseextensions.viewer)
      #   - Secret Manager Viewer (roles/secretmanager.viewer)
      #   - Secret Manager Secret Accessor (roles/secretmanager.secretAccessor)
      #
      # Secrets that must exist in Google Cloud Secret Manager:
      #   - CLAUDE_API_KEY   (firebase functions:secrets:set CLAUDE_API_KEY)
      #   - OPENAI_API_KEY   (firebase functions:secrets:set OPENAI_API_KEY)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # ── Client app ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      # ── Deploy hosting + rules (always) ──────────────────────────
      - name: Deploy Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: barneshome-3dfbb

      - name: Deploy Firestore rules + indexes
        run: npx firebase-tools@latest deploy --only firestore --project barneshome-3dfbb --non-interactive --force

      - name: Deploy Storage rules
        run: npx firebase-tools@latest deploy --only storage --project barneshome-3dfbb --non-interactive --force

      - name: Configure Storage CORS
        run: |
          # Use gcloud storage (properly uses Application Default Credentials from auth step)
          # Try the new bucket naming format first, then legacy
          BUCKET_NEW="${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}"
          BUCKET_LEGACY="barneshome-3dfbb.appspot.com"

          # Determine which bucket exists
          BUCKET=""
          if [ -n "$BUCKET_NEW" ]; then
            echo "Trying bucket: $BUCKET_NEW"
            if gcloud storage buckets describe "gs://$BUCKET_NEW" --format="value(name)" 2>/dev/null; then
              BUCKET="$BUCKET_NEW"
            fi
          fi
          if [ -z "$BUCKET" ]; then
            echo "Trying legacy bucket: $BUCKET_LEGACY"
            if gcloud storage buckets describe "gs://$BUCKET_LEGACY" --format="value(name)" 2>/dev/null; then
              BUCKET="$BUCKET_LEGACY"
            fi
          fi

          if [ -z "$BUCKET" ]; then
            echo "::warning::Could not find storage bucket. CORS not configured."
            exit 0
          fi

          echo "Setting CORS on gs://$BUCKET"
          # The auth@v2 action sets GOOGLE_APPLICATION_CREDENTIALS which gsutil reads.
          gsutil cors set storage-cors.json "gs://$BUCKET"
          echo "CORS configured successfully on gs://$BUCKET"

          # Verify
          echo "Verifying CORS config:"
          gsutil cors get "gs://$BUCKET"

      # ── Cloud Functions (when functions/ has changes) ────────────
      - name: Check for functions changes
        id: functions-changed
        run: |
          # Compare functions/ against the merge base to catch all changes
          # even when multiple PRs are merged at once
          MERGE_BASE=$(git merge-base HEAD HEAD~1 2>/dev/null || echo "HEAD~1")
          if git diff --quiet "$MERGE_BASE" HEAD -- functions/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install functions dependencies
        if: steps.functions-changed.outputs.changed == 'true'
        run: cd functions && npm ci

      - name: Lint functions
        if: steps.functions-changed.outputs.changed == 'true'
        run: cd functions && npm run lint

      - name: Test functions
        if: steps.functions-changed.outputs.changed == 'true'
        run: cd functions && npm test

      - name: Build functions
        if: steps.functions-changed.outputs.changed == 'true'
        run: cd functions && npm run build

      - name: Deploy Cloud Functions
        if: steps.functions-changed.outputs.changed == 'true'
        run: npx firebase-tools@latest deploy --only functions --project barneshome-3dfbb --non-interactive --force
