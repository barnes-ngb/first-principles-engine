name: Deploy to Firebase

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npx vitest run

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: barneshome-3dfbb

      # ── Cloud Functions (only when functions/ changes) ──────────
      # Required IAM roles on the service account for functions deploy:
      #   - Cloud Functions Admin (roles/cloudfunctions.admin)
      #   - Service Account User (roles/iam.serviceAccountUser)
      #   - Cloud Build Editor (roles/cloudbuild.builds.editor)
      #   - Storage Admin (roles/storage.admin)
      #   - Artifact Registry Admin (roles/artifactregistry.admin) — for 2nd gen functions
      #   - Service Usage Consumer (roles/serviceusage.serviceUsageConsumer) — API enablement checks
      - name: Check for functions changes
        id: functions-changed
        run: |
          if git diff --quiet HEAD~1 HEAD -- functions/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install functions dependencies
        if: steps.functions-changed.outputs.changed == 'true'
        run: cd functions && npm ci

      - name: Build functions
        if: steps.functions-changed.outputs.changed == 'true'
        run: cd functions && npm run build

      - name: Deploy Cloud Functions
        if: steps.functions-changed.outputs.changed == 'true'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp_key.json
          npx firebase-tools@latest deploy --only functions --project barneshome-3dfbb --non-interactive --force
          rm -f /tmp/gcp_key.json
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp_key.json
