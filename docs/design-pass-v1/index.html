<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Principles Foundry — Design Pass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Press+Start+2P&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f0eee9;
        font-family: "Inter", system-ui, sans-serif;
        color: #222;
      }
      /* phone frame helper */
      .phone {
        width: 390px;
        height: 844px;
        background: #000;
        border-radius: 44px;
        padding: 10px;
        box-sizing: border-box;
        position: relative;
        box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.25);
      }
      .phone__screen {
        width: 100%;
        height: 100%;
        border-radius: 34px;
        overflow: hidden;
        position: relative;
        background: #fff;
      }
      .phone__notch {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: 118px;
        height: 32px;
        background: #000;
        border-radius: 20px;
        z-index: 60;
      }
      .statusbar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 28px 0;
        font-size: 14px;
        font-weight: 600;
        color: #111;
        z-index: 50;
        font-feature-settings: "tnum";
      }
      .statusbar--dark { color: #d8e6c8; }
      .statusbar__icons {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .screen {
        position: absolute;
        inset: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding-top: 50px;
        padding-bottom: 90px;
      }
      .screen::-webkit-scrollbar { display: none; }
      /* tab bar */
      .tabbar {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 84px;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid rgba(0,0,0,0.06);
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        padding-top: 8px;
        z-index: 40;
      }
      .tabbar__item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        color: #8b8b97;
        font-weight: 500;
      }
      .tabbar__item--active { color: #5c6bc0; }
      .tabbar__icon {
        width: 24px; height: 24px;
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="ui-kit.jsx"></script>
    <script type="text/babel" src="shelly-screens.jsx"></script>
    <script type="text/babel" src="lincoln-screens.jsx"></script>
    <script type="text/babel" src="tablet-screens.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
